name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with flake8
        run: flake8 openfisca_canada_mvohwr app

      - name: Compile check
        run: python -m compileall openfisca_canada_mvohwr app

      - name: Run app tests
        run: python -m pytest tests_app -v

      - name: Run OpenFisca tests
        run: openfisca test --country-package openfisca_canada_mvohwr openfisca_canada_mvohwr/tests
